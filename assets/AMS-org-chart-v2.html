<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANCA Manufacturing Solutions — Organisation Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#009ADE;--purple:#715091;--magenta:#E31D93;
    --ink:#2b2f3a;--ink-soft:#6b7280;--line:#cfd6e4;--card-bd:#e4e8f0;
    --bg:#f4f6fb;--panel:#fff;
    --shadow:0 1px 2px rgba(20,30,60,.06),0 6px 18px rgba(20,30,60,.06);
    --shadow-hi:0 6px 14px rgba(0,154,222,.18),0 14px 36px rgba(20,30,60,.14);
    --radius:14px;--font:"Hanken Grotesk","Noto Sans Thai",ui-sans-serif,system-ui,sans-serif;
  }
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:16px 24px;background:var(--panel);border-bottom:1px solid var(--card-bd)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:38px;height:38px;border-radius:10px;flex:none;background:linear-gradient(135deg,var(--blue),var(--purple) 55%,var(--magenta));display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 10px rgba(113,80,145,.3)}
  .titles h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
  .titles p{margin:1px 0 0;font-size:12.5px;color:var(--ink-soft);font-weight:500}
  .seg{display:inline-flex;background:#eef1f7;border-radius:10px;padding:4px;gap:2px}
  .seg button{border:0;background:transparent;font-family:inherit;font-weight:600;font-size:13px;color:var(--ink-soft);padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.active{background:var(--purple);color:#fff;box-shadow:0 2px 6px rgba(113,80,145,.35)}
  .search{position:relative;flex:1;min-width:200px;max-width:420px}
  .search input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);padding:11px 14px 11px 40px;border:1px solid var(--card-bd);border-radius:10px;background:#fff;outline:none;transition:.15s}
  .search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,154,222,.15)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
  .spacer{flex:1}.actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-weight:600;font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--card-bd);border-radius:9px;padding:9px 13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--blue);color:var(--blue)}.btn svg{width:15px;height:15px}
  .stats{display:flex;gap:26px;align-items:center;padding:10px 24px;background:var(--panel);border-bottom:1px solid var(--card-bd);flex-wrap:wrap}
  .stat{display:flex;align-items:baseline;gap:7px}
  .stat b{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat span{font-size:12.5px;color:var(--ink-soft);font-weight:500}
  .stat .dot{width:9px;height:9px;border-radius:50%}
  .viewport{position:relative;height:calc(100vh - 137px);overflow:hidden;cursor:grab;background:radial-gradient(circle at 1px 1px,rgba(43,47,58,.07) 1px,transparent 0) 0 0/26px 26px}
  .viewport.grabbing{cursor:grabbing}
  .canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;padding:60px}
  .zoombar{position:absolute;left:18px;top:18px;display:flex;flex-direction:column;gap:8px;z-index:5}
  .zoombar button{width:40px;height:40px;border-radius:10px;border:1px solid var(--card-bd);background:#fff;color:var(--ink);display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow);transition:.15s}
  .zoombar button:hover{color:var(--blue);border-color:var(--blue)}.zoombar svg{width:18px;height:18px}
  .zoomlevel{position:absolute;left:18px;bottom:18px;background:#fff;border:1px solid var(--card-bd);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;color:var(--ink-soft);box-shadow:var(--shadow);font-variant-numeric:tabular-nums}
  .forest{display:flex;align-items:flex-start;gap:80px}
  .tree,.tree ul,.tree li{position:relative;margin:0;padding:0}
  .tree ul{display:flex;justify-content:center;padding-top:30px;list-style:none}
  .tree li{list-style:none;display:flex;flex-direction:column;align-items:center;padding:30px 14px 0}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;width:50%;height:30px;border-top:2px solid var(--line)}
  .tree li::after{left:50%;border-left:2px solid var(--line)}
  .tree li::before{right:50%;border-right:2px solid var(--line)}
  .tree li:only-child::after,.tree li:only-child::before{display:none}
  .tree li:only-child{padding-top:30px}
  .tree li:first-child::before,.tree li:last-child::after{border:0}
  .tree li:last-child::before{border-right:2px solid var(--line)}
  .tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--line);width:0;height:30px}
  .tree li.collapsed>ul{display:none}
  .node{position:relative;width:240px;background:#fff;border:1px solid var(--card-bd);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;text-align:left;transition:transform .15s,box-shadow .15s,border-color .15s,opacity .15s}
  .node::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:4px;background:var(--blue)}
  .node[data-depth="0"]::before{background:var(--purple)}
  .node[data-depth="1"]::before{background:var(--blue)}
  .node[data-depth="2"]::before{background:var(--magenta)}
  .node[data-depth="3"]::before{background:#16a34a}
  .node[data-depth="4"]::before{background:#f59e0b}
  .node:hover{transform:translateY(-2px);box-shadow:var(--shadow-hi);border-color:var(--blue)}
  .node .name{font-weight:700;font-size:14.5px;line-height:1.25;padding-right:20px}
  .node .lead{font-size:12px;color:var(--purple);font-weight:600;margin-top:2px}
  .node .tag{display:inline-block;margin-top:7px;font-size:10.5px;font-weight:700;color:var(--blue);background:rgba(0,154,222,.1);padding:2px 8px;border-radius:20px}
  .node .metrics{margin-top:9px;display:flex;flex-direction:column;gap:3px}
  .node .metric{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);font-weight:500}
  .node .metric b{color:var(--ink);font-weight:800;font-variant-numeric:tabular-nums;min-width:34px}
  .node .metric .k{width:6px;height:6px;border-radius:50%;background:var(--line)}
  .node .metric.m1 .k{background:var(--blue)}
  .toggle{position:absolute;right:10px;top:12px;width:22px;height:22px;border-radius:7px;border:1px solid var(--card-bd);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);transition:.15s}
  .toggle:hover{color:var(--blue);border-color:var(--blue)}.toggle svg{width:13px;height:13px;transition:transform .2s}
  li.collapsed>.node .toggle svg{transform:rotate(-90deg)}
  li.collapsed>.node .toggle{background:var(--blue);border-color:var(--blue);color:#fff}
  .node.match{border-color:var(--magenta);box-shadow:0 0 0 3px rgba(227,29,147,.18)}
  .node.dim{opacity:.3}

  .node .head{display:flex;gap:10px;align-items:flex-start}
  .avatar{width:44px;height:44px;border-radius:12px;flex:none;object-fit:cover;border:1px solid var(--card-bd);background:#eef1f7}
  .avatar.init{display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple))}
  .node .headtxt{min-width:0}
  .node{cursor:pointer}
  .capturing .viewport, .capturing .canvas{overflow:visible!important}

  /* ---- VERTICAL stacking for large teams ----
     When a manager has many direct reports, their <ul> gets class "stack":
     children list downward in a single column instead of a wide row. The
     connector becomes an elbow on the left, like an indented list. */
  .tree ul.stack{flex-direction:column;align-items:flex-start;padding-top:30px;
    padding-left:46px;gap:0}
  .tree ul.stack>li{padding:0 0 14px 0;align-items:flex-start}
  .tree ul.stack>li::before,.tree ul.stack>li::after{display:none}
  /* a single vertical spine down the column */
  .tree ul.stack::before{content:'';position:absolute;left:22px;top:0;bottom:22px;
    width:2px;background:var(--line)}
  /* horizontal elbow from spine into each card */
  .tree ul.stack>li>.node::after{content:'';position:absolute;left:-24px;top:28px;
    width:24px;height:2px;background:var(--line)}
  .tree ul.stack>li>.node{margin-left:0}
  /* nested children of a stacked node keep the normal tree below them */
  .tree ul.stack ul{padding-left:0}

  /* ---- profile bubble (click a card) ---- */
  .pop-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.32);z-index:40;
    display:none;align-items:flex-start;justify-content:center;padding-top:6vh}
  .pop-backdrop.on{display:flex}
  .pop{width:380px;max-width:92vw;background:#fff;border-radius:18px;
    box-shadow:0 24px 60px rgba(15,23,42,.28);overflow:hidden;animation:popin .16s ease-out}
  @keyframes popin{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .pop .ph{display:flex;gap:14px;align-items:center;padding:18px 20px;
    background:linear-gradient(120deg,var(--blue),var(--purple) 80%);color:#fff}
  .pop .ph .av{width:58px;height:58px;border-radius:14px;object-fit:cover;flex:none;
    border:2px solid rgba(255,255,255,.6);background:#dfe6f2}
  .pop .ph .av.init{display:grid;place-items:center;font-weight:800;font-size:20px;color:#fff;
    background:linear-gradient(135deg,#6ea8d8,#9a7fb8)}
  .pop .ph .nm{font-weight:800;font-size:17px;line-height:1.2}
  .pop .ph .ro{font-size:12.5px;opacity:.92;margin-top:2px}
  .pop .bd{padding:8px 20px 6px}
  .pop .row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #eef1f6;font-size:13px}
  .pop .row:last-child{border-bottom:0}
  .pop .row .lb{width:108px;color:var(--ink-soft);font-weight:600;flex:none}
  .pop .row .vl{color:var(--ink);font-weight:600;word-break:break-word}
  .pop .ft{padding:12px 20px 18px;display:flex;gap:10px}
  .pop .ft button{flex:1;padding:11px;border-radius:11px;border:0;font-weight:700;font-size:13.5px;cursor:pointer}
  .pop .ft .more{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
  .pop .ft .close{background:#eef1f6;color:var(--ink-soft)}
  .pop .hint{font-size:11px;color:var(--ink-soft);padding:0 20px 14px;margin-top:-4px}
  @media(max-width:720px){.titles p{display:none}.stats{gap:16px}}
</style>
</head>

// value = base64 data URI ("data:image/jpeg;base64,...."). The HRM app injects this
// from the employee database photos; standalone users can paste entries manually.
const PHOTOS = /*__PHOTOS_JSON__*/{}/*__END_PHOTOS_JSON__*/;
/* { exact node name : { emp_no, nickname, dept, phone, email, manager } }
   Injected live by the app for the profile bubble. Only non-sensitive
   preview fields are sent here; salary/PDPA fields are NEVER placed in this
   file — they are shown server-side on the profile page per the viewer's role. */
const EMP_MAP = /*__EMPMAP_JSON__*/{}/*__END_EMPMAP_JSON__*/;

let MODE = 'people';

const fmt = n => Number(n).toLocaleString('en-US');
const canvas = document.getElementById('canvas');

function buildCard(node, depth){
  const card=document.createElement('div');
  card.className='node'; card.dataset.depth=Math.min(depth,4);
  card.dataset.q=((node.name||'')+' '+(node.lead||'')+' '+(node.tag||'')).toLowerCase();
  const photo = node.photo || PHOTOS[node.name];
  const initials = (node.name||'?').replace(/\(.*?\)/g,'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase();
  const av = (MODE==='people')
    ? (photo ? `<img class="avatar" src="${photo}" alt="" loading="lazy">`
             : `<div class="avatar init">${initials}</div>`)
    : '';
  let h=`<div class="head">${av}<div class="headtxt"><div class="name">${node.name}</div>`;
  if(node.lead) h+=`<div class="lead">${node.lead}</div>`;
  h+='</div></div>';
  if(node.tag)  h+=`<div class="tag">${node.tag}</div>`;
  if(node.metrics&&node.metrics.length){
    h+='<div class="metrics">';
    node.metrics.forEach((m,i)=>h+=`<div class="metric ${i===1?'m1':''}"><span class="k"></span><b>${fmt(m.v)}</b><span>${m.l}</span></div>`);
    h+='</div>';
  }
  card.innerHTML=h;
  // store identity for the profile bubble
  card.dataset.name = node.name || '';
  card.dataset.role = node.lead || '';
  card.dataset.tag  = node.tag  || '';
  if(MODE==='people'){
    card.addEventListener('click',e=>{
      if(e.target.closest('.toggle')) return;   // toggle handled separately
      openProfile(node);
    });
  }
  if(node.children&&node.children.length){
    const t=document.createElement('button'); t.className='toggle';
    t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>`;
    t.onclick=e=>{e.stopPropagation();card.closest('li').classList.toggle('collapsed');};
    card.appendChild(t);
  }
  return card;
}
function renderNode(node,depth){
  const li=document.createElement('li');
  li.appendChild(buildCard(node,depth));
  if(node.children&&node.children.length){
    const ul=document.createElement('ul');
    // VERTICAL stacking when a manager has many direct reports: a long
    // horizontal row runs off-screen, so list them downward instead.
    const STACK_THRESHOLD = 6;
    const leafHeavy = node.children.filter(c=>!(c.children&&c.children.length)).length;
    if(node.children.length >= STACK_THRESHOLD && leafHeavy >= STACK_THRESHOLD){
      ul.classList.add('stack');
    }
    node.children.forEach(c=>ul.appendChild(renderNode(c,depth+1)));
    li.appendChild(ul);
    if(depth>=1 && MODE==='people') li.classList.add('collapsed'); // start tidy
  }
  return li;
}
function renderTree(root){
  const tree=document.createElement('div');tree.className='tree';
  const ul=document.createElement('ul');ul.appendChild(renderNode(root,0));tree.appendChild(ul);
  return tree;
}
function countNodes(n){return 1+(n.children||[]).reduce((s,c)=>s+countNodes(c),0);}
function draw(){
  canvas.innerHTML='';
  const forest=document.createElement('div');forest.className='forest';
  const data=DB[MODE];
  data.forEach(r=>forest.appendChild(renderTree(r)));
  canvas.appendChild(forest);
  if(MODE==='people'){
    const total=data.reduce((s,r)=>s+countNodes(r),0);
    set('s1',total,'people','l1');set('s2',DB.meta.depts,'departments','l2');set('s3',data.length,'reporting roots','l3');
  }else{
    set('s1',DB.meta.total,'total headcount','l1');set('s2',DB.meta.depts,'departments','l2');set('s3',1,'site','l3');
  }
}
function set(id,v,lab,lid){document.getElementById(id).textContent=fmt(v);document.getElementById(lid).textContent=lab;}

const vp=document.getElementById('viewport');
let scale=1,tx=60,ty=30,panning=false,sx=0,sy=0;
function apply(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;document.getElementById('zoomLevel').textContent=Math.round(scale*100)+'%';}
function zoomTo(n,cx,cy){n=Math.min(2.2,Math.max(0.2,n));const r=vp.getBoundingClientRect();cx=cx??r.width/2;cy=cy??r.height/2;tx=cx-(cx-tx)*(n/scale);ty=cy-(cy-ty)*(n/scale);scale=n;apply();}
document.getElementById('zoomIn').onclick=()=>zoomTo(scale*1.2);
document.getElementById('zoomOut').onclick=()=>zoomTo(scale/1.2);
document.getElementById('reset').onclick=()=>{scale=1;tx=60;ty=30;apply();};
function fit(){const inner=canvas.firstChild;if(!inner)return;const cw=inner.scrollWidth,ch=inner.scrollHeight,r=vp.getBoundingClientRect(),pad=70;scale=Math.max(Math.min((r.width-pad)/cw,(r.height-pad)/ch,1.3),0.2);tx=(r.width-cw*scale)/2;ty=Math.max((r.height-ch*scale)/2,30);apply();}
document.getElementById('fit').onclick=fit;
vp.addEventListener('wheel',e=>{if(e.ctrlKey||e.metaKey){e.preventDefault();zoomTo(scale*(e.deltaY<0?1.1:.9),e.offsetX,e.offsetY);}else{e.preventDefault();tx-=e.deltaX;ty-=e.deltaY;apply();}},{passive:false});
vp.addEventListener('mousedown',e=>{if(e.target.closest('button'))return;panning=true;sx=e.clientX-tx;sy=e.clientY-ty;vp.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(panning){tx=e.clientX-sx;ty=e.clientY-sy;apply();}});
window.addEventListener('mouseup',()=>{panning=false;vp.classList.remove('grabbing');});
let pinch=null;
vp.addEventListener('touchstart',e=>{if(e.touches.length===1){panning=true;sx=e.touches[0].clientX-tx;sy=e.touches[0].clientY-ty;}else if(e.touches.length===2){panning=false;pinch=dist(e);}},{passive:true});
vp.addEventListener('touchmove',e=>{if(e.touches.length===1&&panning){tx=e.touches[0].clientX-sx;ty=e.touches[0].clientY-sy;apply();}else if(e.touches.length===2&&pinch){const d=dist(e);zoomTo(scale*(d/pinch));pinch=d;}},{passive:true});
vp.addEventListener('touchend',()=>{panning=false;pinch=null;});
function dist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

document.getElementById('expandAll').onclick=()=>canvas.querySelectorAll('li.collapsed').forEach(li=>li.classList.remove('collapsed'));
document.getElementById('collapseAll').onclick=()=>canvas.querySelectorAll('.tree>ul>li>ul li').forEach(li=>{if(li.querySelector(':scope>ul'))li.classList.add('collapsed');});

const search=document.getElementById('search');
search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  const cards=canvas.querySelectorAll('.node');
  if(!q){cards.forEach(c=>c.classList.remove('match','dim'));return;}
  let first=null;
  cards.forEach(c=>{const hit=c.dataset.q.includes(q);c.classList.toggle('match',hit);c.classList.toggle('dim',!hit);if(hit){if(!first)first=c;let li=c.closest('li');while(li){li.classList.remove('collapsed');li=li.parentElement.closest('li');}}});
  if(first){const r=vp.getBoundingClientRect(),cr=first.getBoundingClientRect();tx+=r.width/2-(cr.left+cr.width/2);ty+=r.height/2-(cr.top+cr.height/2);apply();}
});

document.getElementById('viewSeg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  MODE=b.dataset.view;
  document.getElementById('subtitle').textContent=MODE==='people'?'Reporting Lines':'Business Units';
  search.value='';draw();scale=1;tx=60;ty=30;setTimeout(fit,40);
});


draw();
window.addEventListener('load',()=>setTimeout(fit,80));
window.addEventListener('resize',()=>fit());
</script>
<div class="pop-backdrop" id="popBackdrop">
  <div class="pop" id="pop" onclick="event.stopPropagation()"></div>
</div>
<script>
/* ---- Profile bubble ---------------------------------------------------
   Shows a quick preview from EMP_MAP (safe fields only). "View full
   profile" sends a message to the Streamlit app, which opens that person's
   profile page with role-based gating (salary/PDPA only for super admin). */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function openProfile(node){
  const info = EMP_MAP[node.name] || {};
  const photo = node.photo || PHOTOS[node.name];
  const initials=(node.name||'?').replace(/\(.*?\)/g,'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase();
  const av = photo ? `<img class="av" src="${photo}" alt="">`
                   : `<div class="av init">${initials}</div>`;
  const row=(lb,vl)=> vl ? `<div class="row"><div class="lb">${lb}</div><div class="vl">${esc(vl)}</div></div>` : '';
  const pop=document.getElementById('pop');
  pop.innerHTML =
    `<div class="ph">${av}<div><div class="nm">${esc(node.name)}</div>`+
    `<div class="ro">${esc(node.lead||'')}</div></div></div>`+
    `<div class="bd">`+
      row('ชื่อเล่น / Nick', info.nickname)+
      row('รหัส / Emp No.', info.emp_no)+
      row('แผนก / Dept', info.dept || node.tag)+
      row('โทร / Phone', info.phone)+
      row('อีเมล / Email', info.email)+
      row('ผู้บังคับบัญชา / Manager', info.manager)+
    `</div>`+
    (info.emp_no
      ? `<div class="ft"><button class="more" onclick="viewFull('${esc(info.emp_no)}')">เปิดโปรไฟล์เต็ม / View full profile</button>`+
        `<button class="close" onclick="closeProfile()">ปิด / Close</button></div>`
      : `<div class="ft"><button class="close" onclick="closeProfile()" style="flex:1">ปิด / Close</button></div>`+
        `<div class="hint">ไม่พบรหัสพนักงานสำหรับผู้นี้ในระบบ / No employee record linked — open the app's Employee Data to view full details.</div>`);
  document.getElementById('popBackdrop').classList.add('on');
}
function closeProfile(){document.getElementById('popBackdrop').classList.remove('on');}
function viewFull(empNo){
  // Streamlit sandboxes this iframe, so direct navigation is blocked.
  // Copy the Emp. No. and point the user at the in-app profile opener
  // that sits right above the chart (server-side + role-gated).
  try{ navigator.clipboard.writeText(empNo); }catch(e){}
  var pop=document.getElementById('pop');
  var note=document.createElement('div');
  note.className='hint';
  note.style.cssText='background:#eef6ff;border-top:1px solid #d6e7fb;padding:10px 20px 12px;margin:0;font-size:12px;color:#1d4e7a';
  note.innerHTML='📋 คัดลอกรหัส <b>'+esc(empNo)+'</b> แล้ว — วางในช่อง '+
    '"เปิดโปรไฟล์พนักงาน" <b>ด้านบนผังนี้</b> เพื่อดูโปรไฟล์เต็ม<br>'+
    'Copied <b>'+esc(empNo)+'</b> — paste it in the "Open staff profile" box '+
    '<b>above this chart</b> to view the full profile.';
  var old=pop.querySelector('.hint'); if(old) old.remove();
  pop.appendChild(note);
}
document.getElementById('popBackdrop').addEventListener('click',closeProfile);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeProfile();});
</script>
</body>
</html>
